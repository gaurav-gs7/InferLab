version: 0.2

# This buildspec is an opt-in validation recipe. It creates no AWS resources,
# calls no AWS APIs, and requires no AWS credentials inside the build.
phases:
  install:
    runtime-versions:
      golang: 1.26
  pre_build:
    commands:
      - go version
      - go mod verify
      - test -z "$(gofmt -l .)"
  build:
    commands:
      - go vet ./...
      - go test -coverprofile=coverage.out -covermode=atomic ./...
      - go test -race ./...
      - FUZZTIME=2s make fuzz
      - make build
      - bash scripts/demo-safety-case.sh dist/safety-gate
  post_build:
    commands:
      - ./bin/inferlab version
      - ./bin/inferlab change validate examples/qwen-vllm-batching-change.json
      - ./bin/inferlab runtime validate examples/runtime-signature-l4-vllm.json
      - ./bin/inferlab evidence validate examples/guidellm-observed-evidence.json

artifacts:
  files:
    - bin/inferlab
    - coverage.out
    - dist/safety-gate/**/*
  discard-paths: false
